heading:
  de: "Koproduktion"
  en: "Coproduction"
body:
  de: |-
    Bei der Entwicklung der Ausstellungsstücke legen wir großen Wert auf Koproduktion. Wir bilden Tandems aus je ein*er Wissenschaftler*in und eine*r Künstler*in und jedes Tandem entwickelt sein Ausstellungsstück gemeinsam. Die Perspektiven, Ideen und persönlichen Geschichten der Tandem-Mitglieder vermischen sich, entwickeln sich weiter und prägen das Thema und die Erzählung des Ausstellungsstücks. Dieses Werk verkörpert somit sowohl den künstlerischen Ausdruck als auch die wissenschaftliche Auseinandersetzung mit den Themen.

    Wir laden die Besuchenden ein, die Themen unserer Ausstellung zu erkunden und ihre eigenen Gedanken dazu auszudrücken. Dafür stellen wir den Raum und die Materialien zur Verfügung. Die Besuchenden können ihre Beiträge bei uns hinterlassen, damit sie in der Abschlussausstellung gezeigt werden. Auf diese Weise hoffen wir, die Abschlussausstellung nicht nur gemeinsam mit den an diesem Projekt beteiligten Kunst- und Wissenschaftler*innen, sondern auch mit allen Besuchenden zu gestalten.
  en: |-
    Throughout the development of the exhibition pieces, we emphasize on practicing co-production. One scientist and one artist are paired into tandems and each tandem develops their exhibition piece together. The tandem members' perspectives, ideas, and personal stories mix, evolve, and shape the theme and the narrative of the exhibition piece. This piece, therefore, emobdies both the artistic expression and scientific inquiry of the themes.

    We invite visitors to explore the themes of our exhibition and express themselves. To that end, we provide the space and materials. Visitors can leave their contributions with us to be displayed in the final exhibition. Through this, we hope to co-produce the final exhibition not only among art and science practitioners involved in this project but also with all the visitors.