heading:
  de: "Über das Team"
  en: "About the team"
body:
  de: |-
    Hinter der Ausstellung steht ein interdisziplinäres Team aus Wissenschaftler:innen, Künstler:innen und Vermittler:innen, das gemeinsam an der Schnittstelle zwischen Forschung, Kunst und Gesellschaft arbeitet.

    Die Mitwirkenden bringen ihre Expertise aus Ökologie, partizipativer Forschung, Communication Design und kuratorischer Praxis ein, um Räume für Reflexion und Austausch zu schaffen.
  en: |-
    Behind the exhibition stands an interdisciplinary team of scientists, artists and mediators, working together at the intersection of research, art and society.

    Contributors bring expertise from ecology, participatory research, communication design and curatorial practice to create spaces for reflection and exchange.
