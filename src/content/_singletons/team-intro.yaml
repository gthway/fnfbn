heading:
  de: "Über das Team"
  en: "About the team"
body:
  de: |-
    Wir sind eine bunte Mischung aus Studierenden, Absolventen und Freiberufler*innen. Von Töpferei über Tanz bis hin zur Malerei und von den Naturwissenschaften über Klimamodellierung bis hin zur Soziologie bringen wir vielfältige Hintergründe, Fähigkeiten und Perspektiven mit.
  en: |-
    We are a mix of students, graduates, and freelancers. From pottery to dance to painting and from the natural sciences to climate modeling to sociology we bring with us a wide variety of backgrounds, skillsets, and perspectives.