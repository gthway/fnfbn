title: "Datenschutzerklärung"
lastUpdated: "Mai 2026"
body: |-
  Diese Datenschutzerklärung informiert dich darüber, wie wir personenbezogene Daten beim Besuch dieser Website verarbeiten.

  ## 1. Verantwortlicher

  Verantwortlich für die Datenverarbeitung im Sinne von Art. 4 Nr. 7 DSGVO:

  [Vor- und Nachname]
  [Straße + Hausnummer]
  [PLZ Ort]
  E-Mail: [deine.email@example.com]

  ## 2. Erhebung beim Besuch der Website

  Wenn du diese Website besuchst, übermittelt dein Browser automatisch Daten an den Server unseres Hosting-Anbieters. Diese Server-Logs enthalten:

  – IP-Adresse
  – Datum und Uhrzeit der Anfrage
  – Browser-Typ und Version
  – Betriebssystem
  – Referrer-URL

  Rechtsgrundlage ist Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse am stabilen Betrieb der Website). Die Daten werden spätestens nach 30 Tagen gelöscht.

  ## 3. Hosting

  Diese Website wird gehostet bei Netlify, Inc., 44 Montgomery Street, Suite 300, San Francisco, California 94104, USA. Hierbei werden personenbezogene Daten (u.a. IP-Adresse) in die USA übermittelt. Die Übermittlung erfolgt auf Grundlage von Standardvertragsklauseln gemäß Art. 46 Abs. 2 DSGVO.

  Mehr Informationen: https://www.netlify.com/privacy/

  ## 4. Kontaktformular

  Wenn du das Kontaktformular nutzt, übermittelst du uns:

  – die von dir eingegebene Nachricht
  – deine E-Mail-Adresse

  Die Daten werden über Netlify Forms verarbeitet und an unsere E-Mail-Adresse weitergeleitet. Rechtsgrundlage ist Art. 6 Abs. 1 lit. a DSGVO (Einwilligung durch Absenden des Formulars) sowie lit. b (Anbahnung oder Erfüllung einer Anfrage). Wir speichern deine Anfrage bis zur abschließenden Bearbeitung, längstens 12 Monate.

  ## 5. Cookies

  Diese Website setzt keine eigenen Cookies und nutzt keine Tracking-Dienste, Analytics oder Werbe-Cookies.

  ## 6. Schriftarten

  Schriftarten (Geist und Faculty Glyphic) werden ausschließlich vom Server dieser Website ausgeliefert. Es findet keine Verbindung zu Google Fonts oder anderen externen Schrift-Diensten statt.

  ## 7. Deine Rechte

  Du hast jederzeit das Recht auf:

  – Auskunft über deine bei uns gespeicherten Daten (Art. 15 DSGVO)
  – Berichtigung unrichtiger Daten (Art. 16 DSGVO)
  – Löschung (Art. 17 DSGVO)
  – Einschränkung der Verarbeitung (Art. 18 DSGVO)
  – Datenübertragbarkeit (Art. 20 DSGVO)
  – Widerspruch gegen die Verarbeitung (Art. 21 DSGVO)
  – Widerruf einer erteilten Einwilligung mit Wirkung für die Zukunft (Art. 7 Abs. 3 DSGVO)

  Zudem steht dir das Recht zu, dich bei einer Datenschutz-Aufsichtsbehörde zu beschweren (Art. 77 DSGVO). Zuständig ist die Aufsichtsbehörde deines üblichen Aufenthaltsorts oder die für unseren Sitz zuständige Behörde.

  ## 8. Kontakt zu Datenschutzfragen

  Bitte richte alle Anliegen zu deinen Daten an:

  E-Mail: [deine.email@example.com]
