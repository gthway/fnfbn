heading:
  de: "Über die Ausstellung"
  en: "About the exhibition"
body:
  de: |-
    Das Projekt „Forming Nature, Formed by Nature\" erforscht die Mensch-Natur-Beziehung über ein innovatives Format. In einer ko-produzierten Ausstellung werden persönliche Geschichten mit wissenschaftlichen Fakten verbunden und unterschiedliche Perspektiven zusammengebracht.

    Das Projekt trägt zur Nachbarschaftskultur bei und bringt Menschen aus unterschiedlichen Hintergründen zusammen. Es leistet außerdem einen Beitrag zur Entwicklung von Methoden im Bereich der partizipativen Forschung und stärkt den Austausch zwischen Wissenschaft, Kunst und Gesellschaft.
  en: |-
    The project "Forming Nature, Formed by Nature" explores the human-nature relationship through an innovative format. In a co-produced exhibition, personal stories are connected with scientific facts, bringing together different perspectives.

    The project contributes to neighborhood culture and brings people from diverse backgrounds together. It also contributes to the development of methods in the field of participatory research and strengthens the exchange between science, art, and society.
