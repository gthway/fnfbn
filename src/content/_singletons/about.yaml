heading:
  de: "Über die Ausstellung"
  en: "About the exhibition"
body:
  de: |-
    Das Projekt „Forming Nature, Formed by Nature“ erforscht die Beziehung zwischen Mensch und Natur durch ein innovatives Format. In einer gemeinsam erarbeiteten Ausstellung werden persönliche Geschichten mit wissenschaftlichen Fakten verknüpft, wodurch die unterschiedlichen Perspektiven zusammengeführt werden. In Gemeinschaftszentren und Bars schaffen wir Räume für Reflexion, Erkundung und die Stärkung der eigenen Naturbeziehung.

    Das Projekt leistet einen Beitrag zur Nachbarschaftskultur und bringt Menschen unterschiedlichster Hintergründe zusammen. Zudem trägt es zur Entwicklung von Methoden im Bereich der partizipativen Forschung bei und stärkt den Austausch zwischen Wissenschaft, Kunst und Gesellschaft.
    
  en: |-
    Our project explores the human-nature-relationship through an innovative format. In a co-produced exhibition, personal stories are conncected with scientific facts and brings together the perspectives of science and art. Additionally, we create spaces for reflection, exploration, and strengthening one’s own relationship with nature in community centers and bars. Thereby we contribute to the neighbourhood culture and bring people from diverse backgrounds together.

    Through the practice of transdisciplinary exchange and participatory exhibition design, our project contributes to the development of methods of in the field on participatory research and strengthens the exhchange between science, art and society.